name: Build Mac App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pygame pyinstaller

    - name: Build Mac App
      run: |
        pyinstaller --onedir --windowed --icon=calculator/device.icns --add-data "*.png:." calculator/calculate.py

    - name: Zip Mac build
      run: |
        cd dist
        zip -r Calculator_Mac_v1.zip calculator

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: calculator-mac
        path: dist/Calculator_Mac_v1.zip
