name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pygame pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --icon=snake/biggerlogo.ico --add-data "snake/*.png;." --add-data "snake/*.wav;." snake/snake.py

    - name: Zip Windows build
      run: |
        powershell Compress-Archive -Path dist/*.exe -DestinationPath dist/Snake_Windows_v3.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: snake-windows
        path: dist/Snake_Windows_v3.zip
