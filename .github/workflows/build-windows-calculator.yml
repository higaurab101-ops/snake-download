name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pygame pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onedir --windowed ^
        --icon=snake/device.ico ^
        --add-data "calculator/*.png;." ^
        --add-data "calculator/calculate.p;." ^
        snake/main.py

    - name: Zip Windows build
      run: |
        powershell Compress-Archive -Path dist/snake -DestinationPath dist/Calculator_${{ github.ref_name }}.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: calculator-windows
        path: dist/Calculator_${{ github.ref_name }}.zip
